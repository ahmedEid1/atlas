name: evals

# Runs the agent against every YAML under `evals/golden/` and persists
# the per-(goldenId, metric) score to the `EvalRun` table. The public
# `/evals` page reads from there, so this workflow is the only way fresh
# data reaches that dashboard.
#
# Triggers:
#   - `schedule`: weekly on Monday 06:00 UTC (after the weekend, before
#     the EU work week starts so any regression is visible by Monday AM)
#   - `workflow_dispatch`: manual trigger from the GitHub UI (useful for
#     ad-hoc baselines after seeding new goldens, or to debug)
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   - DATABASE_URL                     # Neon pooled
#   - DIRECT_DATABASE_URL              # Neon direct (used by prisma migrate)
#   - MISTRAL_API_KEY                  # default LLM provider, free Experiment tier
#   - LANGFUSE_PUBLIC_KEY              # tracing
#   - LANGFUSE_SECRET_KEY              # tracing
#   - LANGFUSE_HOST                    # https://cloud.langfuse.com (or self-hosted)
#   - S3_ENDPOINT                      # Cloudflare R2 endpoint
#   - S3_REGION
#   - S3_ACCESS_KEY_ID
#   - S3_SECRET_ACCESS_KEY
#   - S3_BUCKET
#   - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY # required by lib/env.ts Zod parse
#   - CLERK_SECRET_KEY                  # required by lib/env.ts Zod parse
#   - CLERK_WEBHOOK_SIGNING_SECRET      # required by lib/env.ts Zod parse
#
# Mistral's free Experiment tier is rate-limited (~1 RPS). The agent's
# cite-check loop is already serial (PARALLEL=1) and the cost-cap at
# 250k tokens per run keeps any single run bounded, so a full sweep of
# the 17 goldens stays well inside the free-tier budget. If usage grows
# past the free tier in the future, either bump LLM_FALLBACK_PROVIDER
# or move the workflow off the schedule and back to manual trigger.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-evals:
    name: Run evals + regression check
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      LLM_PROVIDER: mistral
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_WEBHOOK_SIGNING_SECRET: ${{ secrets.CLERK_WEBHOOK_SIGNING_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack + pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Run evals
        run: pnpm eval
        # Writes eval-results.json + persists per-(goldenId, metric)
        # rows to the EvalRun table that /evals reads from.

      - name: Check for regressions
        run: pnpm eval:check
        # Reads eval-results.json, compares each metric to the most
        # recent prior baseline for that (goldenId, metric), and exits
        # non-zero if any metric dropped > 10% (REGRESSION_THRESHOLD in
        # scripts/check-eval-regression.ts).

      - name: Upload eval-results.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_id }}
          path: eval-results.json
          if-no-files-found: ignore
          retention-days: 30
